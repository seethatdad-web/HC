plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.example.hc'
    compileSdk 33

    defaultConfig {
        applicationId "com.example.hc"
        minSdk 26
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    // Базовые библиотеки, чтобы Kotlin и Android не ругались при сборке
    implementation 'androidx.core:core-ktx:1.9.0'
}
